name: Sync GitHub Leaderboard

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: sync-github-leaderboard
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync leaderboard data
        env:
          ELUMA_GITHUB_SCHOOL_TOKEN: ${{ secrets.ELUMA_GITHUB_SCHOOL_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/sync_github_leaderboard.py

      - name: Commit leaderboard update
        run: |
          if git diff --quiet -- data/players/github-leaderboard.json; then
            echo "No leaderboard changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/players/github-leaderboard.json
          git commit -m "chore: sync GitHub leaderboard"
          git push
